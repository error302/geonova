name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test

  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_APP_URL: https://geonova-henna.vercel.app
          DISABLE_PWA: 'true'

  python-engine:
    name: Python engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r services/geospatial-engine/requirements.txt
      - name: Smoke test
        run: |
          cd services/geospatial-engine
          python -c "
          from processing.terrain import compute_tin, TINRequest, PointInput
          from processing.volume import calculate_volume, VolumeRequest, VolumePoint
          from processing.contours import generate_contours, ContourRequest, ContourPoint
          
          # TIN smoke test
          pts = [PointInput(x=0,y=0,z=0), PointInput(x=10,y=0,z=5), PointInput(x=5,y=10,z=3), PointInput(x=10,y=10,z=8)]
          result = compute_tin(TINRequest(points=pts))
          assert len(result.triangles) > 0
          
          # Volume smoke test
          surface = [VolumePoint(x=i,y=j,z=5.0) for i in range(5) for j in range(5)]
          vol = calculate_volume(VolumeRequest(surface_points=surface, boundary_points=surface, reference_elevation=0))
          assert vol.cut_volume > 0
          
          # Contours smoke test
          cpts = [ContourPoint(x=i,y=j,z=float(i+j)) for i in range(5) for j in range(5)]
          contours = generate_contours(ContourRequest(points=cpts, interval=2.0))
          assert len(contours.contours) > 0
          
          print('All Python engine tests passed')
          "
